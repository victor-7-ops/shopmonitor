version: "3.9"

services:
  app:
    build:
      context: ../app
      dockerfile: Dockerfile
    image: shopmonitor-app:latest
    container_name: shopmonitor_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-shopmonitor_db}
      DB_USER: ${DB_USER:-shopmonitor}
      DB_PASS: ${DB_PASS:?DB_PASS must be set}
      PORT: 3000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shopmonitor_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.24-alpine
    container_name: shopmonitor_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/shopmonitor.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/shopmonitor:/var/www/shopmonitor:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - shopmonitor_net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  mysql:
    image: mysql:8.0
    container_name: shopmonitor_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?required}
      MYSQL_DATABASE: ${DB_NAME:-shopmonitor_db}
      MYSQL_USER: ${DB_USER:-shopmonitor}
      MYSQL_PASSWORD: ${DB_PASS:?required}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - shopmonitor_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
    driver: local

networks:
  shopmonitor_net:
    driver: bridge
