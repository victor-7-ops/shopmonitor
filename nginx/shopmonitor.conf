# nginx virtual host config: shopmonitor
# File: /etc/nginx/sites-available/shopmonitor.conf
# Enable: sudo ln -s /etc/nginx/sites-available/shopmonitor.conf /etc/nginx/sites-enabled/
# Test:   sudo nginx -t
# Reload: sudo systemctl reload nginx

upstream shopmonitor_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name shopmonitor.local;

    access_log /var/log/nginx/shopmonitor.access.log combined;
    error_log  /var/log/nginx/shopmonitor.error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Health check endpoint — proxied to Node app
    location /health {
        proxy_pass http://shopmonitor_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    # Metrics endpoint
    location /metrics {
        proxy_pass http://shopmonitor_app;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API — proxy everything else to app
    location /api/ {
        proxy_pass http://shopmonitor_app;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Static files
    location /static/ {
        alias /var/www/shopmonitor/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Default — static HTML fallback
    location / {
        root  /var/www/shopmonitor;
        index index.html;
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        root /var/www/shopmonitor;
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/shopmonitor;
        internal;
    }
}
